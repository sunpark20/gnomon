name: Gnomon
options:
  bundleIdPrefix: com.sunguk.gnomon
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  Gnomon:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Gnomon
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Gnomon/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunguk.gnomon.Gnomon
        PRODUCT_NAME: Gnomon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Sunguk. All rights reserved."
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  GnomonTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: GnomonTests
    dependencies:
      - target: Gnomon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunguk.gnomon.GnomonTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Gnomon.app/Contents/MacOS/Gnomon"

schemes:
  Gnomon:
    build:
      targets:
        Gnomon: all
        GnomonTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GnomonTests
    archive:
      config: Release
